<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <h2>📹 مكالمة فيديو</h2>

    <div class="room">
        <input id="roomInput" placeholder="رقم الغرفة">
        <button id="createBtn">إنشاء غرفة</button>
        <button id="joinBtn">انضمام</button>
        <button id="hangupBtn" class="hangup-btn">إنهاء المكالمة</button>
    </div>

    <div class="videos">
        <div>
            <h3>أنا</h3>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <h3>الطرف الآخر</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <!-- واجهة الدردشة -->
    <div id="chat-container" class="chat-container">
        <h3>💬 الدردشة</h3>
        <div id="messages" class="messages-box"></div>
        <div class="chat-controls">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك...">
            <button id="sendBtn">إرسال</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
